<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Contratos - CEOCARD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #e65c00; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; }
        input[type="text"], select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: white; }
        .maiusculo { text-transform: uppercase; }
        .linha-dupla { display: flex; gap: 10px; }
        .linha-dupla div { flex: 1; }
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gerador de Documentos</h2>
        
        <label>1. Selecione o Modelo do Documento:</label>
        <select id="modeloContrato">
            <option value="contratos/Contrato_ceocard.docx">Contrato CEOCARD</option>
            <option value="contratos/Recibo.docx">Recibo</option>
        </select>

        <label>Nome do Cliente (Contratante):</label>
        <input type="text" id="cliente" class="maiusculo" placeholder="Ex: EMPRESA FICTÍCIA LTDA">

        <div class="linha-dupla">
            <div>
                <label>Cidade:</label>
                <input type="text" id="cidade" placeholder="Ex: Ananindeua">
            </div>
            <div>
                <label>UF:</label>
                <input type="text" id="uf" class="maiusculo" placeholder="Ex: PA" maxlength="2">
            </div>
        </div>

        <div class="linha-dupla">
            <div>
                <label>CEP:</label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9" oninput="aplicarMascaraCEP(this)">
            </div>
            <div>
                <label>CPF / CNPJ:</label>
                <input type="text" id="cnpj" placeholder="000.000.000-00" maxlength="18" oninput="aplicarMascaraCpfCnpj(this)">
            </div>
        </div>

        <label>Termos de Compra (se houver):</label>
        <input type="text" id="termosCompra" placeholder="Ex: Pagamento em 3x">

        <label>Data por Extenso (se houver):</label>
        <input type="text" id="dataExtenso" placeholder="Ex: 20 de março de 2026">

        <button onclick="gerarDocumento()">Gerar Documento Preenchido</button>
    </div>

    <script>
        function aplicarMascaraCEP(campo) {
            let valor = campo.value.replace(/\D/g, ""); 
            valor = valor.replace(/^(\d{5})(\d)/, "$1-$2"); 
            campo.value = valor; 
        }

        function aplicarMascaraCpfCnpj(campo) {
            let valor = campo.value.replace(/\D/g, ""); 
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
                valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                valor = valor.replace(/^(\d{2})(\d)/, "$1.$2");
                valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                valor = valor.replace(/\.(\d{3})(\d)/, ".$1/$2");
                valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
            }
            campo.value = valor; 
        }

        async function gerarDocumento() {
            // Pega o caminho do arquivo selecionado (ex: "contratos/Recibo.docx")
            const caminhoArquivo = document.getElementById('modeloContrato').value;
            
            // Pega o nome do documento selecionado para dar nome ao arquivo salvo (ex: "Recibo")
            const nomeSelecionadoMenu = document.getElementById('modeloContrato').options[document.getElementById('modeloContrato').selectedIndex].text;

            try {
                // O app busca o arquivo usando o caminho
                const resposta = await fetch(caminhoArquivo);

                if (!resposta.ok) {
                    alert("Erro: O arquivo modelo não foi encontrado na pasta 'contratos'. Verifique se os nomes estão exatos.");
                    return;
                }

                const conteudo = await resposta.arrayBuffer();

                const zip = new PizZip(conteudo);
                const documento = new window.docxtemplater(zip, {
                    paragraphLoop: true,
                    linebreaks: true,
                    delimiters: { start: '{', end: '}' } 
                });

                const valCliente = document.getElementById('cliente').value.toUpperCase();
                const valCidade = document.getElementById('cidade').value;
                const valUF = document.getElementById('uf').value.toUpperCase();
                const valCEP = document.getElementById('cep').value;
                const valCNPJ = document.getElementById('cnpj').value;
                const valTermos = document.getElementById('termosCompra').value;
                const valData = document.getElementById('dataExtenso').value;

                documento.render({
                    cliente: valCliente,
                    cidade: valCidade,
                    UF: valUF,
                    CEP: valCEP,
                    CNPJ: valCNPJ,
                    termos: valTermos,
                    data: valData
                });

                const arquivoGerado = documento.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                });

                // Salva o arquivo com o tipo de documento + nome do cliente
                // Exemplo: "Recibo_JOAO DA SILVA.docx"
                saveAs(arquivoGerado, nomeSelecionadoMenu + "_" + valCliente + ".docx");

            } catch (erro) {
                console.error("Erro ao gerar o documento:", erro);
                alert("Ocorreu um erro no processamento. Tente novamente.");
            }
        }
    </script>
</body>
</html>
