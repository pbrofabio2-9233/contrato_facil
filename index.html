<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Ceocard</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; border-top: 5px solid #e65c00; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; background-color: #f8fafc; font-size: 15px; outline: none; }
        input:focus { border-color: #e65c00; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(135deg, #ff7e14, #e65c00); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(230, 92, 0, 0.3); }
        .erro { color: red; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="assets/Ativo_12Logo_Ceocard.png" alt="Logo Ceocard" class="logo">
        <h2 style="color: #2c3e50; margin-top: 0;">Portal do Colaborador</h2>
        
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="senha" placeholder="Palavra-passe">
        
        <p id="msgErro" class="erro">Dados incorretos. Tente novamente.</p>
        
        <button onclick="entrar()">Aceder ao Sistema</button>
    </div>

    <script>
        // ==========================================
        // COLOQUE AS SUAS CHAVES DO FIREBASE AQUI!
        // ==========================================
        const firebaseConfig = {
            apiKey: "COLOQUE_A_SUA_API_KEY_AQUI",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);

        // Função de Login
        function entrar() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const msgErro = document.getElementById("msgErro");

            firebase.auth().signInWithEmailAndPassword(email, senha)
            .then((userCredential) => {
                // Sucesso! Vai para o Painel de Aplicações
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                msgErro.style.display = "block";
            });
        }

        // Se já estiver logado, não precisa logar de novo
        firebase.auth().onAuthStateChanged((user) => {
            if (user) { window.location.href = "dashboard.html"; }
        });
    </script>
</body>
</html>
