<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Documentos - CEOCARD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .wrapper { max-width: 750px; margin: 0 auto; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #e65c00; margin-bottom: 20px; }
        h3 { color: #2c3e50; font-size: 16px; margin-top: 25px; border-bottom: 2px solid #e65c00; padding-bottom: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; color: #555; }
        
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background-color: #fafafa; font-size: 15px; transition: 0.3s; }
        input[type="text"]:focus, input[type="date"]:focus, select:focus { border-color: #e65c00; outline: none; background-color: #fff; }
        .maiusculo { text-transform: uppercase; }
        
        .linha-dupla { display: flex; gap: 15px; align-items: flex-end; }
        .linha-dupla div { flex: 1; }
        
        .btn-buscar { background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-buscar:hover { background-color: #2980b9; }

        #caixaPersonalizada { display: none; background-color: #fff3e6; padding: 20px; border: 1px dashed #e65c00; border-radius: 8px; margin-top: 15px; }
        
        .escondido { display: none; }

        button.btn-principal { width: 100%; padding: 15px; margin-top: 30px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-principal:hover { background-color: #219653; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <h2>Gerador de Documentos</h2>
            
            <label>Selecione o Modelo do Documento:</label>
            <select id="modeloContrato" onchange="adaptarTela()">
                <option value="Contrato_ceocard.docx">Contrato CEOCARD</option>
                <option value="Recibo.docx">Recibo</option>
            </select>

            <h3>Dados do Cliente</h3>
            
            <div class="linha-dupla">
                <div style="flex: 2;">
                    <label>CPF / CNPJ:</label>
                    <input type="text" id="cnpj" placeholder="Digite para buscar..." maxlength="18" oninput="aplicarMascaraCpfCnpj(this)">
                </div>
                <div style="flex: 1;">
                    <button class="btn-buscar" onclick="buscarDadosCNPJ()">🔍 Buscar</button>
                </div>
            </div>

            <label>Nome do Cliente (Contratante):</label>
            <input type="text" id="cliente" class="maiusculo" placeholder="Ex: EMPRESA FICTÍCIA LTDA">

            <div id="dadosEndereco">
                <div class="linha-dupla">
                    <div><label>Cidade:</label><input type="text" id="cidade" placeholder="Ex: Ananindeua"></div>
                    <div><label>UF:</label><input type="text" id="uf" class="maiusculo" placeholder="Ex: PA" maxlength="2"></div>
                </div>

                <div class="linha-dupla">
                    <div><label>CEP:</label><input type="text" id="cep" placeholder="00000-000" maxlength="9" oninput="aplicarMascaraCEP(this)"></div>
                    <div><label>Data do Documento:</label><input type="date" id="dataEscolhida"></div>
                </div>
            </div>
            
            <div id="dataRecibo" class="escondido">
                <label>Data do Recibo:</label>
                <input type="date" id="dataEscolhidaRecibo">
            </div>

            <h3>Configuração dos Cartões</h3>
            <label>Escolha o Pacote:</label>
            <select id="pacoteCartoes" onchange="verificarPacote()">
                <option value="0">Selecione...</option>
                <option value="500">500 unidades (R$ 17,00/un)</option>
                <option value="1000">1.000 unidades (R$ 13,00/un)</option>
                <option value="2000">2.000 unidades (R$ 11,00/un)</option>
                <option value="personalizado">Personalizado (Digitar Manualmente)</option>
            </select>

            <div id="caixaPersonalizada">
                <label style="color: #e65c00; text-align: center; margin-top: 0;">Preencha os dados personalizados:</label>
                <div class="linha-dupla">
                    <div><label>Qtd (Número):</label><input type="text" id="qtdCartoes" placeholder="Ex: 350"></div>
                    <div><label>Qtd (Extenso):</label><input type="text" id="qtdExtenso" placeholder="Ex: trezentos e cinquenta"></div>
                </div>
                
                <label style="font-size: 12px; color: gray; margin-bottom: -10px;">Para Contrato:</label>
                <div class="linha-dupla">
                    <div><label>Valor Unitário (R$):</label><input type="text" id="valorCartao" placeholder="Ex: 20,00"></div>
                    <div><label>Unitário (Extenso):</label><input type="text" id="valorExtenso" placeholder="Ex: vinte reais"></div>
                </div>

                <label style="font-size: 12px; color: gray; margin-bottom: -10px;">Para Recibo:</label>
                <div class="linha-dupla">
                    <div><label>Valor Total (R$):</label><input type="text" id="valorTotal" placeholder="Ex: 7.000,00"></div>
                    <div><label>Total (Extenso):</label><input type="text" id="valorTotalExtenso" placeholder="Ex: sete mil reais"></div>
                </div>
            </div>

            <button class="btn-principal" onclick="gerarDocumento()">Gerar Documento Preenchido</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            const dataPadrao = `${ano}-${mes}-${dia}`;
            
            document.getElementById('dataEscolhida').value = dataPadrao;
            document.getElementById('dataEscolhidaRecibo').value = dataPadrao;
        };

        // --- Função Corrigida: Esconde apenas Endereço/CEP ---
        function adaptarTela() {
            const documentoEscolhido = document.getElementById("modeloContrato").value;
            const divEndereco = document.getElementById("dadosEndereco");
            const divDataRecibo = document.getElementById("dataRecibo");

            if (documentoEscolhido === "Recibo.docx") {
                divEndereco.classList.add("escondido");
                divDataRecibo.classList.remove("escondido");
            } else {
                divEndereco.classList.remove("escondido");
                divDataRecibo.classList.add("escondido");
            }
        }

        async function buscarDadosCNPJ() {
            let cnpjDigitado = document.getElementById('cnpj').value.replace(/\D/g, "");
            if (cnpjDigitado.length !== 14) { alert("Por favor, digite um CNPJ completo para buscar."); return; }
            document.getElementById('cliente').value = "Buscando dados na Receita...";
            try {
                const resposta = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpjDigitado}`);
                if (!resposta.ok) throw new Error("CNPJ não encontrado");
                const dados = await resposta.json();
                
                document.getElementById('cliente').value = dados.razao_social;
                
                // Preenche o resto silenciosamente (mesmo se estiverem escondidos, o valor fica salvo!)
                document.getElementById('cidade').value = dados.municipio;
                document.getElementById('uf').value = dados.uf;
                let cep = dados.cep ? dados.cep.toString() : "";
                if(cep.length === 8) cep = cep.substring(0,5) + "-" + cep.substring(5);
                document.getElementById('cep').value = cep;
                
            } catch (erro) {
                alert("Não foi possível encontrar esse CNPJ.");
                document.getElementById('cliente').value = "";
            }
        }

        function aplicarMascaraCEP(campo) {
            let valor = campo.value.replace(/\D/g, ""); valor = valor.replace(/^(\d{5})(\d)/, "$1-$2"); campo.value = valor; 
        }

        function aplicarMascaraCpfCnpj(campo) {
            let valor = campo.value.replace(/\D/g, ""); 
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2"); valor = valor.replace(/(\d{3})(\d)/, "$1.$2"); valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                valor = valor.replace(/^(\d{2})(\d)/, "$1.$2"); valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3"); valor = valor.replace(/\.(\d{3})(\d)/, ".$1/$2"); valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
            }
            campo.value = valor; 
        }

        function verificarPacote() {
            const escolha = document.getElementById("pacoteCartoes").value;
            const caixa = document.getElementById("caixaPersonalizada");
            if (escolha === "personalizado") { caixa.style.display = "block"; } else { caixa.style.display = "none"; }
        }

        function formatarDataPorExtenso(dataDoCalendario) {
            if (!dataDoCalendario) return "";
            const partes = dataDoCalendario.split('-'); 
            const ano = partes[0]; const mesNumero = parseInt(partes[1]) - 1; const dia = partes[2];
            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            return dia + " de " + meses[mesNumero] + " de " + ano;
        }

        async function gerarDocumento() {
            const caminhoArquivo = document.getElementById('modeloContrato').value;
            const nomeSelecionadoMenu = document.getElementById('modeloContrato').options[document.getElementById('modeloContrato').selectedIndex].text;

            try {
                const resposta = await fetch(caminhoArquivo);
                if (!resposta.ok) { alert("Erro: O arquivo modelo não foi encontrado."); return; }

                const conteudo = await resposta.arrayBuffer();
                const zip = new PizZip(conteudo);
                const documento = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true, delimiters: { start: '{', end: '}' } });

                const valCliente = document.getElementById('cliente').value.toUpperCase();
                const valCidade = document.getElementById('cidade').value;
                const valUF = document.getElementById('uf').value.toUpperCase();
                const valCEP = document.getElementById('cep').value;
                const valCNPJ = document.getElementById('cnpj').value;
                
                let dataSelecionada = "";
                if (caminhoArquivo === "Recibo.docx") {
                    dataSelecionada = document.getElementById('dataEscolhidaRecibo').value;
                } else {
                    dataSelecionada = document.getElementById('dataEscolhida').value;
                }
                const valDataExtenso = formatarDataPorExtenso(dataSelecionada);

                let pacoteQtd = ""; let pacoteQtdExtenso = "";
                let pacoteValor = ""; let pacoteValorExtenso = "";
                let pacoteValorTotal = ""; let pacoteValorTotalExtenso = "";

                const escolhaPacote = document.getElementById("pacoteCartoes").value;
                
                if (escolhaPacote === "500") {
                    pacoteQtd = "500"; pacoteQtdExtenso = "quinhentos";
                    pacoteValor = "17,00"; pacoteValorExtenso = "dezessete reais";
                    pacoteValorTotal = "8.500,00"; pacoteValorTotalExtenso = "oito mil e quinhentos reais";
                } else if (escolhaPacote === "1000") {
                    pacoteQtd = "1.000"; pacoteQtdExtenso = "mil";
                    pacoteValor = "13,00"; pacoteValorExtenso = "treze reais";
                    pacoteValorTotal = "13.000,00"; pacoteValorTotalExtenso = "treze mil reais";
                } else if (escolhaPacote === "2000") {
                    pacoteQtd = "2.000"; pacoteQtdExtenso = "dois mil";
                    pacoteValor = "11,00"; pacoteValorExtenso = "onze reais";
                    pacoteValorTotal = "22.000,00"; pacoteValorTotalExtenso = "vinte e dois mil reais";
                } else if (escolhaPacote === "personalizado") {
                    pacoteQtd = document.getElementById('qtdCartoes').value;
                    pacoteQtdExtenso = document.getElementById('qtdExtenso').value;
                    pacoteValor = document.getElementById('valorCartao').value;
                    pacoteValorExtenso = document.getElementById('valorExtenso').value;
                    pacoteValorTotal = document.getElementById('valorTotal').value;
                    pacoteValorTotalExtenso = document.getElementById('valorTotalExtenso').value;
                }

                documento.render({
                    cliente: valCliente,
                    cidade: valCidade,
                    UF: valUF,
                    CEP: valCEP,
                    CNPJ: valCNPJ,
                    data: valDataExtenso, 
                    qtd_cartoes: pacoteQtd,
                    qtd_extenso: pacoteQtdExtenso,
                    valor_cartao: pacoteValor,
                    valor_extenso: pacoteValorExtenso,
                    valor_total: pacoteValorTotal,
                    valor_total_extenso: pacoteValorTotalExtenso
                });

                const arquivoGerado = documento.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                saveAs(arquivoGerado, nomeSelecionadoMenu + "_" + valCliente + ".docx");

            } catch (erro) {
                console.error("Erro ao gerar o documento:", erro);
                alert("Ocorreu um erro no processamento. Tente novamente.");
            }
        }
    </script>
</body>
</html>
